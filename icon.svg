<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- The Week Ahead — pine tile, cream calendar page, one day ahead in terra -->
  <rect width="512" height="512" rx="112" fill="#31503F"/>
  <!-- calendar page -->
  <rect x="116" y="112" width="280" height="300" rx="34" fill="#F3ECDD"/>
  <!-- header band -->
  <path d="M116 146 a34 34 0 0 1 34 -34 h212 a34 34 0 0 1 34 34 v40 h-280 Z" fill="#7E9474"/>
  <!-- hanger rings -->
  <rect x="176" y="92" width="16" height="44" rx="8" fill="#31503F"/>
  <rect x="320" y="92" width="16" height="44" rx="8" fill="#31503F"/>
  <!-- week cells: 3 x 2, one filled = the day ahead -->
  <g>
    <rect x="150" y="214" width="60" height="60" rx="15" fill="#A65A40"/>
    <rect x="226" y="214" width="60" height="60" rx="15" fill="#D9D0BE"/>
    <rect x="302" y="214" width="60" height="60" rx="15" fill="#D9D0BE"/>
    <rect x="150" y="290" width="60" height="60" rx="15" fill="#D9D0BE"/>
    <rect x="226" y="290" width="60" height="60" rx="15" fill="#D9D0BE"/>
    <rect x="302" y="290" width="60" height="60" rx="15" fill="#D9D0BE"/>
  </g>
</svg>
